# Container pipeline — lint Dockerfiles, build both images, scan for CVEs, and
# (on main only) publish a :edge image to GHCR for the staging deploy to pick up.
# No paths filter on purpose: the `docker` gate is a required check, and a
# required check that is skipped (because no Docker files changed) would block
# merges forever. The buildx GHA cache keeps unchanged builds fast.
name: Docker

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: apps/api/Dockerfile
          config: .hadolint.yaml
      - name: Lint Web Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: apps/web/Dockerfile
          config: .hadolint.yaml

  build-scan:
    name: build-scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write # only used by the main-only push step
      security-events: write # upload Trivy SARIF report (push only)
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            context: apps/api
          - app: web
            context: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set lowercase image ref
        id: img
        env:
          REPO: ${{ github.repository }}
        run: echo "name=ghcr.io/${REPO,,}-${{ matrix.app }}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      # GATE: fail only on fixable HIGH/CRITICAL in application libraries (npm
      # packages) — the class a PR author can actually fix. Base-OS package CVEs
      # are reported (below) and remediated by Dependabot's docker ecosystem, so
      # unrelated PRs aren't blocked by base-image churn. TRIVY_PKG_TYPES is read
      # by the Trivy CLI directly, independent of the action's input mapping.
      - name: Trivy — fail on app-library HIGH/CRITICAL
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          TRIVY_PKG_TYPES: library
        with:
          image-ref: ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # REPORT (non-blocking): full OS + library findings to the Security tab.
      # Push-only — PRs from forks can't write security events.
      - name: Trivy — full SARIF report
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
      - name: Upload Trivy SARIF to code scanning
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}

      # Publish to GHCR only for pushes to main (never from a PR/fork).
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image (main only — reuses the cached build)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}

  # Single aggregated required check (insulates branch protection from the
  # matrix leg names and from future Dockerfile additions).
  docker:
    name: docker
    needs: [hadolint, build-scan]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all docker jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::One or more Docker jobs failed."
            exit 1
          fi
          echo "All Docker jobs passed."
