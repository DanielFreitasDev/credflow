# OSSF Scorecard — supply-chain security posture (branch protection, pinned
# actions, token permissions, dangerous workflows, etc.). Results land in the
# Security tab under code scanning.
name: Scorecard

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "31 5 * * 1" # Mondays 05:31 UTC
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload SARIF to code scanning
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Set to true + add `id-token: write` to publish the public badge
          # (requires a PUBLIC repository).
          publish_results: false
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: results.sarif
