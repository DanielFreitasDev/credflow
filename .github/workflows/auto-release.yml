# Auto Release — on every push to `main`, derive the next SemVer from the
# Conventional Commit messages landed since the last `v*` tag, create + push the
# annotated tag, and run the reusable Release pipeline for it (versioned GHCR
# images + CycloneDX SBOMs + GitHub Release).
#
# Bump rules (Conventional Commits):
#   • `<type>!:` in a subject, or `BREAKING CHANGE` in a body  → major
#   • `feat:`                                                  → minor
#   • `fix:` / `perf:`                                         → patch
#   • anything else (chore/docs/build/ci/test/refactor/style…) → no release
#
# Why it calls release.yml via `workflow_call` instead of just pushing the tag:
# a tag pushed with GITHUB_TOKEN does NOT trigger the `push: tags` workflow
# (GitHub's anti-recursion rule), so we invoke the reusable Release workflow
# directly with the computed tag. The version job's tag push therefore never
# double-fires release.yml.
name: Auto Release

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  # Serialize releases on a branch so two fast pushes can't race to the same tag.
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # create + push the version tag
    outputs:
      released: ${{ steps.bump.outputs.released }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history + tags so we can scan commits since the last tag

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet || true

          last="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "${last}" ]; then
            base="0.0.0"; range=""           # no tags yet → scan all history
          else
            base="${last#v}"; range="${last}..HEAD"
          fi

          # Parse the base version into numeric major.minor.patch (drop any prerelease suffix).
          base="${base%%-*}"
          major="${base%%.*}"; rest="${base#*.}"
          minor="${rest%%.*}"; patch="${rest#*.}"
          patch="${patch%%[!0-9]*}"
          major="${major:-0}"; minor="${minor:-0}"; patch="${patch:-0}"

          subjects="$(git log ${range:+$range} --format='%s')"
          bodies="$(git log ${range:+$range} --format='%B')"

          bump=""
          if printf '%s\n' "${subjects}" | grep -qE '^[a-z]+(\([^)]+\))?!:' \
             || printf '%s\n' "${bodies}" | grep -qE 'BREAKING[ -]CHANGE'; then
            bump="major"
          elif printf '%s\n' "${subjects}" | grep -qE '^feat(\([^)]+\))?:'; then
            bump="minor"
          elif printf '%s\n' "${subjects}" | grep -qE '^(fix|perf)(\([^)]+\))?:'; then
            bump="patch"
          fi

          if [ -z "${bump}" ]; then
            echo "No releasable (feat/fix/perf/breaking) commits since ${last:-<start>} — skipping release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "${bump}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"

          echo "Releasable change (${bump}): ${last:-<start>} → ${next}"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=${next}" >> "$GITHUB_OUTPUT"

      - name: Create & push tag
        if: steps.bump.outputs.released == 'true'
        env:
          NEW_TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          git push origin "refs/tags/${NEW_TAG}"

  release:
    name: release
    needs: version
    if: needs.version.outputs.released == 'true'
    permissions:
      contents: write # GitHub Release
      packages: write # push images to GHCR
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.version.outputs.tag }}
