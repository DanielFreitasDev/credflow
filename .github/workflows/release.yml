# Release — builds immutable, versioned images for both apps, publishes them to
# GHCR, generates a CycloneDX SBOM per app, and creates a GitHub Release with
# auto-generated notes + the SBOMs attached.
#
# Triggered two ways, both producing an identical release for tag `vX.Y.Z`:
#   • directly, by pushing an annotated `v*` tag (manual / hotfix), or
#   • via `workflow_call` from auto-release.yml, which derives the next SemVer
#     from Conventional Commits on a push to `main` and passes it as inputs.tag.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: "Version tag to release (e.g. v1.2.3). Defaults to the pushed tag."
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never interrupt a release mid-publish

jobs:
  images:
    name: images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            context: apps/api
          - app: web
            context: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set lowercase image ref
        id: img
        env:
          REPO: ${{ github.repository }}
        run: echo "name=ghcr.io/${REPO,,}-${{ matrix.app }}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (semver tags)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref_name }}
            type=sha,prefix=sha-,format=long

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.img.outputs.name }}:${{ steps.meta.outputs.version }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.app }}.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.app }}
          path: sbom-${{ matrix.app }}.cdx.json
          retention-days: 90

  release:
    name: release
    needs: images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # create the GitHub Release
    steps:
      - name: Download SBOMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: sbom-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: "*.cdx.json"
