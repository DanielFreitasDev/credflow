# Application security — SAST (CodeQL), dependency review, and secret scanning.
# Runs on PRs, on pushes to main, and weekly (catches newly-disclosed CVEs in
# code that hasn't changed).
name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # Mondays 04:27 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Static analysis of all JS/TS in the repo (both apps). build-mode: none —
  # JavaScript/TypeScript is analysed from source, no compilation needed.
  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload results to the Security tab
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          build-mode: none
      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:javascript-typescript"

  # Blocks PRs that introduce dependencies with known high+ vulnerabilities or
  # disallowed licenses. Only meaningful on pull_request (needs base..head diff).
  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # No PR comment on purpose: Dependabot/fork PRs run with a read-only
          # GITHUB_TOKEN, so writing a comment fails with "Resource not
          # accessible by integration". Findings still appear in the job summary
          # and still fail this check.

  # Scans the full git history for leaked secrets. Free for personal/public
  # repos; an organisation account requires a GITLEAKS_LICENSE secret.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicit config path: the scheduled run scans full history and would
          # otherwise flag placeholder secrets in our *.env.example templates.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # only for org accounts
