# Keeps dependencies and pinned action SHAs up to date. Minor/patch bumps are
# grouped to cut noise; majors are also grouped per-app (reviewed deliberately).
# A few majors are intentionally pinned via `ignore` — they are large, breaking
# migrations we take on by hand, not via auto-bump.
version: 2
updates:
  # ---- Backend (NestJS) ----
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      api-minor-patch:
        update-types: [minor, patch]
      api-major:
        update-types: [major]
    ignore:
      # Prisma 7 is a major ORM migration (breaking client + schema generator
      # changes, DB implications) — migrate deliberately, not via auto-bump.
      - dependency-name: prisma
        update-types: [version-update:semver-major]
      - dependency-name: "@prisma/client"
        update-types: [version-update:semver-major]
      # Keep @types/node aligned with the pinned Node 20 LTS runtime.
      - dependency-name: "@types/node"
        update-types: [version-update:semver-major]

  # ---- Frontend (React + Vite) ----
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      web-minor-patch:
        update-types: [minor, patch]
      web-major:
        update-types: [major]
    ignore:
      # Tailwind 4 is a ground-up rewrite (CSS-first config) that would touch the
      # whole design system / dark-mode setup — migrate deliberately.
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]

  # ---- GitHub Actions (keeps SHA pins current; one grouped PR) ----
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        update-types: [minor, patch, major]

  # ---- Docker base images ----
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    ignore:
      # Pin to Node 20 LTS (matches .nvmrc + package.json engines).
      - dependency-name: node
        update-types: [version-update:semver-major]
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    ignore:
      - dependency-name: node
        update-types: [version-update:semver-major]
