<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/credflow_app_icon.png" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#255eeb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#071427" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CredFlow — Gestão de Crédito</title>
    <script>
      // Apply the persisted/system theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('credflow.theme');
          var dark = stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
