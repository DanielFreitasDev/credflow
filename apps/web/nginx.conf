server {
  # 8080, not 80: the nginx-unprivileged image runs as a non-root user and
  # cannot bind privileged ports.
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers for the static SPA (the API is separately protected by helmet).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # HSTS: only honored by browsers over HTTPS (ignored on plain HTTP / localhost),
  # so it's safe to always send. Forces HTTPS for a year once seen over TLS.
  add_header Strict-Transport-Security "max-age=31536000" always;
  # CSP: 'unsafe-inline' is required for the pre-paint theme script in index.html
  # and Tailwind's inline styles. connect-src is permissive because the API origin
  # is build-time configurable (VITE_API_URL) and the same image serves the local
  # http demo and an https prod deploy. To lock it down per-deploy, template this
  # header from an env var (the nginxinc image runs envsubst on
  # /etc/nginx/templates/*.template) and set it to your exact API origin, e.g.
  # connect-src 'self' https://api.yourdomain.com.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http: https:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'" always;

  # SPA fallback — let React Router handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
