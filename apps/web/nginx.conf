server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers for the static SPA (the API is separately protected by helmet).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # CSP: 'unsafe-inline' is required for the pre-paint theme script in index.html
  # and Tailwind's inline styles. connect-src is permissive because the API origin
  # is build-time configurable (VITE_API_URL) — tighten it to your API origin in prod.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http: https:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'" always;

  # SPA fallback — let React Router handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
