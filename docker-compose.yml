services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-credflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-credflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-credflow}
    ports:
      # Host port is configurable to avoid clashing with a local PostgreSQL.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-credflow} -d ${POSTGRES_DB:-credflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    # PID1 init that reaps zombies and forwards signals during the multi-phase
    # boot (migrate -> backfill -> seed -> node), where a POSIX sh is PID1.
    init: true
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-credflow}:${POSTGRES_PASSWORD:-credflow_secret}@db:5432/${POSTGRES_DB:-credflow}?schema=public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-3333}:3333"
    # Liveness probe so the web service can wait until the API is actually ready
    # (after migrate/backfill/seed), not merely started.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3333/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    mem_limit: 768m
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5173}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
